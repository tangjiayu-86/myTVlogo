name: Auto-sync
on:
  schedule:
    - cron: "0 */8 * * *"
  workflow_dispatch:
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with: {fetch-depth: 0}
      - name: Sync upstream
        run: |
          u="https://github.com/${{ github.event.repository.parent.full_name }}.git"
          git remote add upstream "$u" 2>/dev/null || git remote set-url upstream "$u"
          git fetch upstream; git checkout main
          git merge upstream/main --allow-unrelated-histories -m "Auto-sync" || echo up-to-date
          git push origin main || echo nothing
